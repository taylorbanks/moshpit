name: release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # GoReleaser needs full history and tags for the changelog.
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          # Track the version declared in go.mod (currently 1.24.x).
          go-version-file: go.mod
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Personal access token: must be able to create releases on this
          # repo AND push the formula to taylorbanks/homebrew-tap.
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
